<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATP Universe 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>ATP Universe</h1>
      <p>2026 Season · Road to Roland Garros</p>
    </div>
    <div class="version">v2.0</div>
  </header>

  <nav class="tabs">
    <button onclick="showTab('home')">Home</button>
    <button onclick="showTab('rankings')">Rankings</button>
    <button onclick="showTab('players')">Players</button>
    <button onclick="showTab('tournaments')">Tournaments</button>
    <button onclick="showTab('australia')">Australian Open</button>
    <button onclick="showTab('admin')">Admin</button>
  </nav>

  <main>
    <section id="home" class="tab active"></section>
    <section id="rankings" class="tab"></section>
    <section id="players" class="tab"></section>
    <section id="tournaments" class="tab"></section>
    <section id="australia" class="tab"></section>
    <section id="admin" class="tab"></section>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
